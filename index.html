<!DOCTYPE html>
<html>
<head>
    <title>Mapa Interactivo CIT - Santa Fe</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .popup-custom { font-family: Arial, sans-serif; line-height: 1.5; }
        .popup-title { color: #2c3e50; font-size: 16px; border-bottom: 2px solid #3498db; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script>
        var map = L.map('map').setView([-31.0, -60.8], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQiZ1cR3VQbDs_sZatnvjLVTZu1NwaHBGRQ-v4fbNILSe73rCgD83JNyJK_l4LAfnVNSedQukxR-r2/pub?output=csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                results.data.forEach(function(row) {
                    var lat = parseFloat(row['Lat']); 
                    var lon = parseFloat(row['Lon']);

                    if (!isNaN(lat) && !isNaN(lon)) {
                        var marker = L.marker([lat, lon]).addTo(map);
                        
                        // Mapeo exacto de tus columnas de Google Sheets
                        var contenido = "<div class='popup-custom'>" +
                                        "<div class='popup-title'>" + (row['Nombre del Establecimiento'] || 'Efector') + "</div>" +
                                        "<b>Nivel:</b> " + (row['Nivel de atencion'] || '-') + "<br>" +
                                        "<b>Región:</b> " + (row['Region'] || '-') + "<br>" +
                                        "<b>Localidad:</b> " + (row['Localidad'] || '-') + "<br>" +
                                        "<b>Especialidades:</b> " + (row['Servicios por especialidad'] || 'No cargadas') +
                                        "</div>";
                        
                        marker.bindPopup(contenido);
                    }
                });
            }
        });
    </script>
</body>
</html>
