<!DOCTYPE html>
<html>
<head>
    <title>Mapa Interactivo CIT - Santa Fe</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .popup-custom { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script>
        // Centramos el mapa en la bota de Santa Fe
        var map = L.map('map').setView([-30.5, -60.8], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Tu enlace CSV
        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQiZ1cR3VQbDs_sZatnvjLVTZu1NwaHBGRQ-v4fbNILSe73rCgD83JNyJK_l4LAfnVNSedQukxR-r2/pub?output=csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                results.data.forEach(function(row) {
                    // ATENCIÓN: Si tus columnas se llaman distinto a 'Lat' y 'Lon', cambialo aquí abajo:
                    var lat = parseFloat(row['Lat']); 
                    var lon = parseFloat(row['Lon']);

                    if (!isNaN(lat) && !isNaN(lon)) {
                        var marker = L.marker([lat, lon]).addTo(map);
                        
                        // Aquí armamos lo que se ve al hacer clic
                        var contenido = "<div class='popup-custom'>" +
                                        "<b>Efector:</b> " + (row['Nombre'] || 'Sin nombre') + "<br>" +
                                        "<b>Nivel:</b> " + (row['Nivel'] || '-') + "<br>" +
                                        "<b>Región:</b> " + (row['Región'] || '-') + "<br>" +
                                        "<b>Especialidades:</b> " + (row['Especialidades'] || 'No cargadas') +
                                        "</div>";
                        
                        marker.bindPopup(contenido);
                    }
                });
            }
        });
    </script>
</body>
</html>
